name: 農業ニュース 毎日自動更新

on:
  # 毎日 AM 8:00 JST (= UTC 23:00 前日)
  schedule:
    - cron: '0 23 * * *'
  # GitHub画面から手動実行も可能
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリをインストール
        run: pip install feedparser

      - name: ニュース取得 & HTML 生成
        run: python scripts/fetch_news.py

      - name: 変更をコミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --staged --quiet; then
            echo "変更なし。スキップします。"
            exit 0
          fi
          git commit -m "🌾 農業ニュース自動更新 $(TZ=Asia/Tokyo date +'%Y-%m-%d')"
          # 一時的な通信エラーに備えてリトライ（最大3回）
          for i in 1 2 3; do
            git push origin main && break
            echo "プッシュ失敗 (${i}/3)。5秒後に再試行..."
            sleep 5
          done
