<style>
:root {
  --bg: #f4f7f2;
  --card: #ffffff;
  --text: #2d3a2e;
  --sub: #6b7c6d;
  --accent: #3d7a4f;
  --border: #dce5dd;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Helvetica Neue', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
header {
  background: var(--accent);
  color: #fff;
  padding: 18px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 6px;
}
header h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: 0.02em; }
.updated { font-size: 0.78rem; opacity: 0.82; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px 16px; }
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-bottom: 20px;
  align-items: center;
}
.filter-label { font-size: 0.82rem; color: var(--sub); }
.filter-btn {
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--text);
  border-radius: 20px;
  padding: 4px 13px;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--fc, var(--accent)); color: var(--fc, var(--accent)); }
.filter-btn.active {
  background: var(--fc, var(--accent));
  color: #fff;
  border-color: var(--fc, var(--accent));
}
.count { font-size: 0.82rem; color: var(--sub); margin-left: auto; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 16px;
}
.card {
  background: var(--card);
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: box-shadow 0.15s, transform 0.15s;
  text-decoration: none;
  color: inherit;
}
.card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.09); transform: translateY(-2px); }
.thumb {
  width: 100%;
  height: 155px;
  background: #e2ece4;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.2rem;
  overflow: hidden;
  flex-shrink: 0;
}
.thumb img { width: 100%; height: 155px; object-fit: cover; display: block; }
.card-body { padding: 13px; flex: 1; display: flex; flex-direction: column; gap: 7px; }
.flags { display: flex; flex-wrap: wrap; gap: 4px; min-height: 20px; }
.flag {
  font-size: 0.68rem;
  padding: 2px 8px;
  border-radius: 12px;
  color: #fff;
  font-weight: 700;
  letter-spacing: 0.03em;
}
.card-title {
  font-size: 0.92rem;
  font-weight: 600;
  line-height: 1.45;
  color: var(--text);
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card:hover .card-title { color: var(--accent); }
.card-meta {
  font-size: 0.75rem;
  color: var(--sub);
  margin-top: auto;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 3px;
}
.no-result {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 0;
  color: var(--sub);
  font-size: 0.95rem;
}
@media (max-width: 480px) {
  .grid { grid-template-columns: 1fr; }
  header h1 { font-size: 1.1rem; }
}
</style>
</head>

function renderCards(filter) {
  const grid = document.getElementById('grid');
  const countEl = document.getElementById('countLabel');
  const list = filter === 'all'
    ? ARTICLES
    : ARTICLES.filter(a => a.flags.some(f => f.name === filter));

  countEl.textContent = list.length + ' 件';

  if (list.length === 0) {
    grid.innerHTML = '<div class="no-result">該当する記事がありません</div>';
    return;
  }

  grid.innerHTML = list.map(a => {
    const thumb = a.thumbnail
      ? `<div class="thumb"><img src="${a.thumbnail}" alt="" loading="lazy"
           onerror="this.parentElement.innerHTML='🌾'"></div>`
      : `<div class="thumb">🌾</div>`;

    const flagsHtml = a.flags.length
      ? a.flags.map(f =>
          `<span class="flag" style="background:${f.color}">${f.name}</span>`
        ).join('')
      : '';

    return `
<a class="card" href="${a.link}" target="_blank" rel="noopener noreferrer">
  ${thumb}
  <div class="card-body">
    <div class="flags">${flagsHtml}</div>
    <div class="card-title">${a.title}</div>
    <div class="card-meta">
      <span>${a.source}</span>
      <span>${a.date}</span>
    </div>
  </div>
</a>`;
  }).join('');
}

document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(btn.dataset.flag);
});

renderCards('all');
</script>
