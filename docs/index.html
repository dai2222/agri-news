<style>
:root {
  --bg: #f4f7f2;
  --card: #ffffff;
  --text: #2d3a2e;
  --sub: #6b7c6d;
  --accent: #3d7a4f;
  --border: #dce5dd;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Helvetica Neue', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
header {
  background: var(--accent);
  color: #fff;
  padding: 18px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 6px;
}
header h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: 0.02em; }
.updated { font-size: 0.78rem; opacity: 0.82; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px 16px; }
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-bottom: 20px;
  align-items: center;
}
.filter-label { font-size: 0.82rem; color: var(--sub); }
.filter-btn {
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--text);
  border-radius: 20px;
  padding: 4px 13px;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--fc, var(--accent)); color: var(--fc, var(--accent)); }
.filter-btn.active {
  background: var(--fc, var(--accent));
  color: #fff;
  border-color: var(--fc, var(--accent));
}
.count { font-size: 0.82rem; color: var(--sub); margin-left: auto; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 16px;
}
.card {
  background: var(--card);
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: box-shadow 0.15s, transform 0.15s;
  text-decoration: none;
  color: inherit;
}
.card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.09); transform: translateY(-2px); }
.card-banner {
  width: 100%;
  height: 90px;
  display: flex;
  align-items: flex-end;
  padding: 10px 14px;
  flex-shrink: 0;
  flex-wrap: wrap;
  gap: 5px;
  position: relative;
  overflow: hidden;
}
.card-banner::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.18);
}
.card-body { padding: 13px; flex: 1; display: flex; flex-direction: column; gap: 7px; }
.flag {
  font-size: 0.68rem;
  padding: 2px 9px;
  border-radius: 12px;
  color: #fff;
  font-weight: 700;
  letter-spacing: 0.03em;
  position: relative;
  z-index: 1;
  background: rgba(255,255,255,0.22);
  border: 1px solid rgba(255,255,255,0.5);
}
.no-flag-icon {
  position: relative;
  z-index: 1;
  font-size: 2rem;
  line-height: 1;
}
.card-title {
  font-size: 0.92rem;
  font-weight: 600;
  line-height: 1.45;
  color: var(--text);
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card:hover .card-title { color: var(--accent); }
.card-meta {
  font-size: 0.75rem;
  color: var(--sub);
  margin-top: auto;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 3px;
}
.no-result {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 0;
  color: var(--sub);
  font-size: 0.95rem;
}
@media (max-width: 480px) {
  .grid { grid-template-columns: 1fr; }
  header h1 { font-size: 1.1rem; }
}
</style>
</head>

function renderCards(filter) {
  const grid = document.getElementById('grid');
  const countEl = document.getElementById('countLabel');
  const list = filter === 'all'
    ? ARTICLES
    : ARTICLES.filter(a => a.flags.some(f => f.name === filter));

  countEl.textContent = list.length + ' 件';

  if (list.length === 0) {
    grid.innerHTML = '<div class="no-result">該当する記事がありません</div>';
    return;
  }

  grid.innerHTML = list.map(a => {
    // バナー背景色：フラグが複数あれば最初の2色でグラデーション、なければアクセント色
    let bannerBg;
    if (a.flags.length >= 2) {
      bannerBg = `linear-gradient(135deg, ${a.flags[0].color} 0%, ${a.flags[1].color} 100%)`;
    } else if (a.flags.length === 1) {
      bannerBg = `linear-gradient(135deg, ${a.flags[0].color} 0%, ${a.flags[0].color}99 100%)`;
    } else {
      bannerBg = 'linear-gradient(135deg, #3d7a4f 0%, #5a9e6f 100%)';
    }

    const flagsHtml = a.flags.length
      ? a.flags.map(f => `<span class="flag">${f.name}</span>`).join('')
      : '<span class="no-flag-icon">🌾</span>';

    return `
<a class="card" href="${a.link}" target="_blank" rel="noopener noreferrer">
  <div class="card-banner" style="background:${bannerBg}">${flagsHtml}</div>
  <div class="card-body">
    <div class="card-title">${a.title}</div>
    <div class="card-meta">
      <span>${a.source}</span>
      <span>${a.date}</span>
    </div>
  </div>
</a>`;
  }).join('');
}

document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(btn.dataset.flag);
});

renderCards('all');
</script>
